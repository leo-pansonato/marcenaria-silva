name: Deploy site to GitHub Pages

# Builda o Next.js como site estático e publica no GitHub Pages a cada push na
# branch master (e permite disparo manual pela aba Actions).
on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissões necessárias para o deploy do Pages via GitHub Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; cancela execuções antigas ainda em andamento.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          # Site publicado sob /<nome-do-repo> no GitHub Pages de projeto.
          # Dinâmico: acompanha o nome do repositório automaticamente.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Disable Jekyll (serve a pasta _next)
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
